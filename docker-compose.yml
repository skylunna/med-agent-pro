version: '3.8'
services:
  gateway:
    build: ./go-gateway
    container_name: med-gateway
    ports: ["8080:8080"]
    environment: [PYTHON_SERVICE_URL=http://ai-engine:8001]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai-engine:
    build: ./python-service
    container_name: med-ai-engine
    ports: ["8001:8001"]
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

