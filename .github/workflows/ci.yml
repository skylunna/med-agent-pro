name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.24'
  PYTHON_VERSION: '3.12'

jobs:
  
  go-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Vet & Format Check
        run: |
          go vet ./...
          gofmt -l . | grep . && { echo "Code not formatted"; exit 1; } || true
      - name: Run Tests
        run: go test -v -race ./...

  
  python-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            python-service/.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('python-service/uv.lock') }}
      - name: Install & Sync
        run: uv sync --frozen
      - name: Lint & Type Check
        run: |
          uv run ruff check . --config "line-length=120"
          uv run ruff format --check .
      - name: Run Tests
        run: uv run pytest --tb=short -q


  docker-build-verify:
    runs-on: ubuntu-latest
    needs: [go-lint-test, python-lint-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      
      - name: Build Go Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./go-gateway
          push: false
          load: true
          tags: med-agent-go:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Python AI Engine Image
        uses: docker/build-push-action@v5
        with:
          context: ./python-service
          push: false
          load: true
          tags: med-agent-python:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

    #   - name: Verify Images
    #     run: |
    #       docker images
    #       docker run --rm med-agent-go:ci-test /app/gateway --help || true
    #       docker run --rm med-agent-python:ci-test uv run fastapi --help || true
      - name: Verify Images
        run: |
                docker images